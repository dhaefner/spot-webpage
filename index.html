<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analyse-Tool</title>

    <link crossorigin="" href="https://fonts.gstatic.com/" rel="preconnect"/>
    <link rel="icon" type="image/svg+xml" href="../root/images/lightning.svg">
    <link rel="stylesheet" href="../root/css/stylesheet.css">
    <script type="module" src="../root/js/api-client.js"></script>
    <script src="../root/js/locales.js" defer></script> 
    <!-- has to come BEFORE header-footer to ensure proper event catch -->
    <script src="../root/js/header-footer.js" defer></script>
    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div id="header"></div>

    <main>
        <section>
            <h1 data-i18n="title"></h1>
        </section>

        <section>
            <div>
                <label for="dateInput" data-i18n="dateLabel"></label>
                <input type="date" id="dateInput" name="date", onchange="loadData()">
            </div>
        </section>
        <section>
            
            <div>
                <h2 id="chartTitle"></h2>
            </div>
            <div class="chart-container">
                <canvas id="stromChart"></canvas>
            </div>
            <div class="options-section">
                <div class="cb-group">
                    <table>
                        <tr>
                            <td>
                                <div>
                                    <input type="checkbox" id="cb_dayaverage" class="hidden-cb" checked="false">
                                    <label for="cb_dayaverage" class="cb" data-i18n="avgDayToggle"></label>
                                </div>
                            </td>
                            <td>
                                <div>
                                    <label data-i18n="comparisonLabel"></label>
                                    <input type="date" id="comparison_dateInput" name="date" placeholder="2025-10-01" value="{{ selected_date}}">
                                    <button onclick="comparisonDay()" data-i18n="showBtn"></button>
                                    <button onclick="" data-i18n="delBtn"></button>
                                </div>
                            </td>
                        </tr>
                        <tr>
                            <td>
                                <div>
                                    <input type="checkbox" id="cb_workDayAverage" class="hidden-cb">
                                    <label for="cb_workDayAverage" class="cb" data-i18n="avgWDayToggle"></label>
                                </div>
                            </td>
                            <td>
                                <div>
                                    <label data-i18n="avgOnDateLabel"></label>
                                    <input type="date" id="avgOnDate_dateInput" name="date" placeholder="2025-10-01" value="{{ selected_date}}">
                                    <button onclick="get_avgOnDate()" data-i18n="showBtn"></button>
                                    <button onclick="" data-i18n="delBtn"></button>
                                </div>
                            </td>
                        </tr>
                        <tr>
                            <td>                                
                                <div>
                                    <input type="checkbox" id="cb_previousYear" class="hidden-cb">
                                    <label for="cb_previousYear" class="cb" data-i18n="prevYearToggle"></label>
                                </div>
                            </td>
                        </tr>
                        <tr>
                            <td>
                                <div>
                                    <input type="checkbox" id="cb_workDayAverageIntervall" class="hidden-cb">
                                    <label for="cb_workDayAverageIntervall" class="cb" data-i18n="prevWDYearToggle"></label>
                                </div>
                            </td>
                        </tr>
                    </table>
                </div>
            </div>
            <div>
                <!--<script src="../static/js/analysis.js"></script>-->
            </div>
        </section>
    </main>
    
    <div id="footer"></div>
</body>
</html>
